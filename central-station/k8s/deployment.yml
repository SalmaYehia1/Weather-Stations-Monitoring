# === OPEN-METEO ADAPTER ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmeteo-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openmeteo-adapter
  template:
    metadata:
      labels:
        app: openmeteo-adapter
    spec:
      containers:
        - name: adapter
          image: adapter:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: adapter-storage
              mountPath: /data/adapter
      volumes:
        - name: adapter-storage
          persistentVolumeClaim:
            claimName: adapter-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-station
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-station
  template:
    metadata:
      labels:
        app: central-station
    spec:
      containers:
        - name: central-station
          image: central-station:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: shared-storage
              mountPath: /app/data
          ports:
            - containerPort: 8080
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: central-station
spec:
  selector:
    app: central-station
  ports:
    - port: 8080
---
