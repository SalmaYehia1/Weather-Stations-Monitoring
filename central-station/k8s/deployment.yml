
# ════════════════════════════════════════════════════════════
# 1. ZOOKEEPER
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
              name: client
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
# ════════════════════════════════════════════════════════════
# 2. KAFKA  (uses Zookeeper)
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          ports:
            - containerPort: 9092
              name: broker
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
---
# ════════════════════════════════════════════════════════════
# 3. SHARED STORAGE  (parquet files + BitCask Riak LSM)
# ════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ════════════════════════════════════════════════════════════
# 4. CENTRAL STATION
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-station
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-station
  template:
    metadata:
      labels:
        app: central-station
    spec:
      containers:
        - name: central-station
          image: central-station:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: shared-storage
              mountPath: /app/data
          ports:
            - containerPort: 8080
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: central-station
spec:
  selector:
    app: central-station
  ports:
    - port: 8080
      targetPort: 8080
---
# ════════════════════════════════════════════════════════════
# 5. OPEN-METEO ADAPTER
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmeteo-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openmeteo-adapter
  template:
    metadata:
      labels:
        app: openmeteo-adapter
    spec:
      containers:
        - name: adapter
          image: adapter:latest
          imagePullPolicy: Never
---
